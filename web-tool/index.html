<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄小说下载器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
        .header{background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;padding:32px 20px;text-align:center}
        .header h1{font-size:28px;margin-bottom:8px}
        .header p{opacity:.85;font-size:14px}
        .container{max-width:720px;margin:0 auto;padding:20px}
        .card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .search-box{display:flex;gap:12px}
        .search-box input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s}
        .search-box input:focus{border-color:#ff6b35}
        .search-box button{padding:12px 28px;background:linear-gradient(135deg,#ff6b35,#ff4444);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s}
        .search-box button:hover{transform:scale(1.02)}
        .search-box button:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .book-item{display:flex;justify-content:space-between;align-items:center;padding:16px;border:2px solid #f0f0f0;border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all .2s}
        .book-item:hover{border-color:#ff6b35;background:#fff8f6}
        .book-item.selected{border-color:#ff6b35;background:#fff3ee}
        .book-title{font-size:16px;font-weight:600;color:#222}
        .book-meta{font-size:13px;color:#888;margin-top:4px}
        .book-count{font-size:13px;color:#ff6b35;font-weight:600;white-space:nowrap;margin-left:12px}
        .empty{text-align:center;color:#999;padding:40px 0}
        .dl-section{display:none}
        .dl-section.active{display:block}
        .dl-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .dl-info h2{font-size:18px}
        .dl-btns{display:flex;gap:8px}
        .btn{border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;padding:10px 22px;transition:transform .1s;color:#fff}
        .btn:hover{transform:scale(1.02)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .btn-dl{background:linear-gradient(135deg,#11998e,#38ef7d)}
        .btn-pause{background:linear-gradient(135deg,#f093fb,#f5576c)}
        .btn-resume{background:linear-gradient(135deg,#4facfe,#00f2fe)}
        .progress{margin-top:20px}
        .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
        .progress-label{font-size:13px;color:#666}
        .progress-pct{font-size:18px;font-weight:700;color:#11998e}
        .progress-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin-bottom:10px}
        .progress-fill{height:100%;background:linear-gradient(90deg,#11998e,#38ef7d);border-radius:5px;transition:width .3s;width:0}
        .progress-detail{display:flex;gap:24px;font-size:13px;color:#888;flex-wrap:wrap}
        .progress-detail span{white-space:nowrap}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff3;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tip{font-size:12px;color:#aaa;margin-top:8px}
        .error{background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:12px 16px;border-radius:8px;margin-top:12px}
    </style>
</head>
<body>

<div class="header">
    <h1>番茄小说下载器</h1>
    <p>粘贴链接或搜索书名，一键下载整本小说</p>
</div>

<div class="container">

    <div class="card">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入书名 / 章节链接 / book_id 后按回车" autofocus>
            <button id="searchBtn" onclick="doSearch()">搜索</button>
        </div>
        <div class="tip">支持搜索书名，或直接粘贴 fanqienovel.com 的章节/书籍链接</div>
    </div>

    <div id="results"></div>

    <div class="card dl-section" id="dlSection">
        <div class="dl-info">
            <div>
                <h2 id="dlTitle"></h2>
                <div style="font-size:13px;color:#888;margin-top:4px" id="dlMeta"></div>
            </div>
            <div class="dl-btns" id="dlBtns"></div>
        </div>
        <div class="progress" id="progress">
            <div class="progress-top">
                <span class="progress-label" id="progressLabel">准备中...</span>
                <span class="progress-pct" id="progressPct">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-detail">
                <span id="detailChapters">章节: 0/0</span>
                <span id="detailSpeed">速度: --</span>
                <span id="detailETA">预计剩余: --</span>
                <span id="detailTime">已用时: 0s</span>
            </div>
        </div>
        <div id="dlError"></div>
    </div>

</div>

<script>
let selectedBook = null;
let sessionId = null;
let pollTimer = null;
let downloadState = 'idle'; // idle | downloading | paused | done

function $(id) { return document.getElementById(id); }

async function api(path, params) {
    let url = path + (params ? '?' + new URLSearchParams(params) : '');
    let resp = await fetch(url);
    return resp.json();
}

function doSearch() {
    let q = $('searchInput').value.trim();
    if (!q) return;
    let btn = $('searchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>搜索中';
    $('results').innerHTML = '';
    resetDownload();

    let hasId = /(\d{16,20})/.test(q);

    if (hasId) {
        api('/api/resolve', {q: q}).then(function(r) {
            if (r.book_id) {
                selectedBook = r;
                $('results').innerHTML = '';
                showDownload();
            } else {
                $('results').innerHTML = '<div class="empty">无法识别链接</div>';
            }
            btn.disabled = false; btn.textContent = '搜索';
        }).catch(function() {
            $('results').innerHTML = '<div class="error">解析失败</div>';
            btn.disabled = false; btn.textContent = '搜索';
        });
    } else {
        api('/api/search', {q: q}).then(function(data) {
            if (data.books && data.books.length > 0) {
                renderResults(data.books);
                data.books.forEach(function(b) { fetchCount(b.book_id); });
            } else {
                $('results').innerHTML = '<div class="empty">未找到相关书籍</div>';
            }
            btn.disabled = false; btn.textContent = '搜索';
        }).catch(function() {
            $('results').innerHTML = '<div class="error">搜索失败</div>';
            btn.disabled = false; btn.textContent = '搜索';
        });
    }
}

function renderResults(books) {
    let html = '';
    books.forEach(function(b) {
        html += '<div class="book-item" id="book-' + b.book_id + '" onclick="selectBook(\'' + b.book_id + '\',\'' + esc(b.title) + '\',\'' + esc(b.author) + '\')">' +
            '<div><div class="book-title">' + escHtml(b.title) + '</div><div class="book-meta">' + escHtml(b.author) + '</div></div>' +
            '<div class="book-count" id="count-' + b.book_id + '">...</div></div>';
    });
    $('results').innerHTML = html;
}

function fetchCount(bookId) {
    api('/api/directory', {book_id: bookId}).then(function(data) {
        let el = $('count-' + bookId);
        if (el) el.textContent = data.total + ' 章';
    }).catch(function() {
        let el = $('count-' + bookId);
        if (el) el.textContent = '?章';
    });
}

function selectBook(bookId, title, author) {
    document.querySelectorAll('.book-item').forEach(function(el) { el.classList.remove('selected'); });
    let el = $('book-' + bookId);
    if (el) el.classList.add('selected');

    resetDownload();
    api('/api/directory', {book_id: bookId}).then(function(data) {
        selectedBook = {book_id: bookId, title: title, author: author, count: data.total};
        showDownload();
    });
}

function showDownload() {
    if (!selectedBook) return;
    $('dlTitle').textContent = selectedBook.title || selectedBook.book_id;
    $('dlMeta').textContent = (selectedBook.author ? selectedBook.author + ' | ' : '') + (selectedBook.count || 0) + ' 章';
    $('dlSection').classList.add('active');
    $('dlError').innerHTML = '';
    updateButtons();
}

function resetDownload() {
    sessionId = null;
    downloadState = 'idle';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    $('dlSection').classList.remove('active');
    $('progressFill').style.width = '0%';
    $('progressPct').textContent = '0%';
    $('progressLabel').textContent = '准备中...';
    $('detailChapters').textContent = '章节: 0/0';
    $('detailSpeed').textContent = '速度: --';
    $('detailETA').textContent = '预计剩余: --';
    $('detailTime').textContent = '已用时: 0s';
    updateButtons();
}

function updateButtons() {
    let html = '';
    if (downloadState === 'idle') {
        html = '<button class="btn btn-dl" onclick="startDownload()">下载整本 TXT</button>';
    } else if (downloadState === 'downloading') {
        html = '<button class="btn btn-pause" onclick="pauseDownload()">暂停</button>';
    } else if (downloadState === 'paused') {
        html = '<button class="btn btn-resume" onclick="resumeDownload()">继续下载</button>';
        html += '<button class="btn btn-dl" onclick="finishDownload()">完成并保存</button>';
    } else if (downloadState === 'done') {
        html = '<button class="btn btn-dl" onclick="finishDownload()">保存 TXT 文件</button>';
    }
    $('dlBtns').innerHTML = html;
}

function startDownload() {
    if (!selectedBook) return;
    downloadState = 'downloading';
    updateButtons();
    $('dlError').innerHTML = '';
    $('progressLabel').textContent = '正在获取章节目录...';

    api('/api/download/start', {book_id: selectedBook.book_id}).then(function(r) {
        sessionId = r.session_id;
        startPolling();
    }).catch(function(e) {
        $('dlError').innerHTML = '<div class="error">启动下载失败: ' + e.message + '</div>';
        downloadState = 'idle';
        updateButtons();
    });
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollStatus, 1000);
    pollStatus();
}

function pollStatus() {
    if (!sessionId) return;
    api('/api/download/status', {session_id: sessionId}).then(function(s) {
        if (!s || s.error) return;

        let current = s.current || 0;
        let total = s.total || 0;

        // 进度
        let pct = total > 0 ? Math.round(current / total * 100) : 0;
        $('progressFill').style.width = pct + '%';
        $('progressPct').textContent = pct + '%';

        // 章节
        $('detailChapters').textContent = '章节: ' + current + '/' + total;

        // 时间
        let elapsed = s.elapsed || 0;
        $('detailTime').textContent = '已用时: ' + formatTime(elapsed);

        // 速度
        if (current > 0 && elapsed > 0) {
            let speed = current / elapsed;
            $('detailSpeed').textContent = '速度: ' + speed.toFixed(1) + ' 章/秒';
        }

        // 预计剩余
        if (current > 0 && current < total) {
            let rate = current / elapsed;
            let remaining = (total - current) / rate;
            $('detailETA').textContent = '预计剩余: ' + formatTime(remaining);
        }

        // 状态文字
        if (s.status === 'downloading') {
            $('progressLabel').textContent = '下载中...';
        } else if (s.status === 'paused') {
            $('progressLabel').textContent = '已暂停 (已下载 ' + current + '/' + total + ' 章)';
            downloadState = 'paused';
            updateButtons();
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        } else if (s.status === 'done') {
            $('progressLabel').textContent = '下载完成！共 ' + total + ' 章';
            $('detailETA').textContent = '预计剩余: --';
            downloadState = 'done';
            updateButtons();
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        } else if (s.status === 'error') {
            $('progressLabel').textContent = '下载出错';
            $('dlError').innerHTML = '<div class="error">下载过程中出现错误，请重试</div>';
            downloadState = 'idle';
            updateButtons();
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }
    });
}

function pauseDownload() {
    if (!sessionId) return;
    api('/api/download/pause', {session_id: sessionId}).then(function() {
        downloadState = 'paused';
        updateButtons();
    });
}

function resumeDownload() {
    if (!sessionId) return;
    api('/api/download/resume', {session_id: sessionId}).then(function() {
        downloadState = 'downloading';
        updateButtons();
        startPolling();
    });
}

function finishDownload() {
    if (!sessionId) return;
    window.open('/api/download/file?session_id=' + sessionId, '_blank');
}

function formatTime(seconds) {
    if (seconds < 60) return Math.round(seconds) + 's';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.round(seconds % 60) + 's';
    return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
}

$('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escHtml(s) { let d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
